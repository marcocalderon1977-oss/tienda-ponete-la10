<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PONETE LA 10 - Catalogos</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;color:#151515}
header{background:linear-gradient(135deg,#111,#333);color:white;text-align:center;padding:22px 12px;font-size:30px;font-weight:900;letter-spacing:1px}
.subtitulo{text-align:center;background:white;padding:10px;color:#555}
.menu{display:flex;gap:10px;padding:12px;overflow:auto;background:white;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.menu button{padding:12px 16px;border:0;border-radius:999px;background:#111;color:white;font-weight:700;white-space:nowrap;cursor:pointer}
.menu button:hover{background:#444}
.contenedor{max-width:1100px;margin:auto;padding:16px}
.admin{background:white;margin:16px 0;padding:18px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.admin h2{margin-top:0}
.grid-admin{display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px}
input,select{width:100%;padding:13px;border:1px solid #ddd;border-radius:12px;font-size:15px}
.btn-guardar{margin-top:10px;padding:14px;background:#078b38;color:white;border:0;border-radius:12px;width:100%;font-size:16px;font-weight:800;cursor:pointer}
.btn-guardar:hover{background:#06722e}
.estado{margin-top:10px;font-weight:700}
.catalogos{padding:10px 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.card{background:white;padding:18px;border-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.card h3{margin:0 0 10px}
.card a{display:block;text-align:center;background:#111;color:white;text-decoration:none;padding:12px;border-radius:12px;font-weight:800;margin-top:10px}
.card button{margin-top:8px;width:100%;padding:10px;border:0;border-radius:10px;background:#b91c1c;color:white;font-weight:700;cursor:pointer}
.vacio{background:white;border-radius:16px;padding:25px;text-align:center;color:#666}
@media(max-width:700px){header{font-size:24px}.grid-admin{grid-template-columns:1fr}.contenedor{padding:10px}.admin{margin:10px 0}.menu{gap:8px}.menu button{padding:10px 12px}}
</style>
</head>
<body>
<header>PONETE LA 10</header>
<div class="subtitulo">Catalogos actualizados globalmente con base de datos en Vercel</div>

<div class="menu" id="menu"></div>

<div class="contenedor">
  <section class="admin">
    <h2>Administrador de catalogos</h2>
    <div class="grid-admin">
      <select id="categoriaAdmin"></select>
      <input id="titulo" placeholder="Titulo del catalogo" />
      <input id="link" placeholder="Pegar link del catalogo" />
    </div>
    <button class="btn-guardar" onclick="guardarCatalogo()">Guardar catalogo global</button>
    <div class="estado" id="estado"></div>
  </section>

  <h2 id="tituloCategoria">Catalogos</h2>
  <div class="catalogos" id="catalogos"></div>
</div>

<script>
const categorias = [
  ['camisas-player','Camisas Player'],
  ['retro','Retro'],
  ['nba','NBA'],
  ['buzos','Buzos'],
  ['entrenamiento','Ropa Entrenamiento'],
  ['nino','Niño'],
  ['mujer','Mujer'],
  ['tenis','Tenis'],
  ['formula1','Formula 1'],
  ['otros','Otros']
];

let categoriaActual = categorias[0][0];

function iniciar(){
  const menu = document.getElementById('menu');
  const select = document.getElementById('categoriaAdmin');
  menu.innerHTML = '';
  select.innerHTML = '';

  categorias.forEach(([valor,nombre])=>{
    menu.innerHTML += `<button onclick="cargar('${valor}')">${nombre}</button>`;
    select.innerHTML += `<option value="${valor}">${nombre}</option>`;
  });

  cargar(categoriaActual);
}

function nombreCategoria(valor){
  const item = categorias.find(c=>c[0]===valor);
  return item ? item[1] : valor;
}

async function guardarCatalogo(){
  const categoria = document.getElementById('categoriaAdmin').value;
  const titulo = document.getElementById('titulo').value.trim();
  const link = document.getElementById('link').value.trim();
  const estado = document.getElementById('estado');

  if(!link){
    estado.textContent = 'Pegue un link primero.';
    estado.style.color = '#b91c1c';
    return;
  }

  estado.textContent = 'Guardando...';
  estado.style.color = '#333';

  const res = await fetch('/api/guardar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({categoria,titulo,link})
  });

  if(!res.ok){
    estado.textContent = 'Error al guardar. Revise la base de datos KV en Vercel.';
    estado.style.color = '#b91c1c';
    return;
  }

  document.getElementById('link').value = '';
  document.getElementById('titulo').value = '';
  estado.textContent = 'Catalogo guardado globalmente.';
  estado.style.color = '#078b38';
  cargar(categoria);
}

async function cargar(categoria){
  categoriaActual = categoria;
  document.getElementById('tituloCategoria').textContent = nombreCategoria(categoria);
  const cont = document.getElementById('catalogos');
  cont.innerHTML = '<div class="vacio">Cargando...</div>';

  try{
    const res = await fetch(`/api/catalogos?categoria=${encodeURIComponent(categoria)}&t=${Date.now()}`);
    const data = await res.json();
    cont.innerHTML = '';

    if(!Array.isArray(data) || data.length===0){
      cont.innerHTML = '<div class="vacio">No hay catalogos guardados en esta categoria.</div>';
      return;
    }

    data.slice().reverse().forEach(item=>{
      cont.innerHTML += `
        <div class="card">
          <h3>${item.titulo || 'Catalogo'}</h3>
          <small>${nombreCategoria(categoria)}</small>
          <a href="${item.link}" target="_blank" rel="noopener">Abrir catalogo</a>
          <button onclick="borrarCatalogo('${categoria}','${item.id}')">Borrar</button>
        </div>`;
    });
  }catch(e){
    cont.innerHTML = '<div class="vacio">No se pudo cargar. Verifique que Vercel KV este conectado.</div>';
  }
}

async function borrarCatalogo(categoria,id){
  if(!confirm('¿Borrar este catalogo?')) return;
  await fetch('/api/borrar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({categoria,id})
  });
  cargar(categoria);
}

iniciar();
</script>
</body>
</html>
